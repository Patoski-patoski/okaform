name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Format check
        run: bun run format

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
        working-directory: backend

      - name: Typecheck
        run: bun run build
        working-directory: backend

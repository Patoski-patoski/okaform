<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0D1F1A"/>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <circle cx="20" cy="20" r="1" fill="#1E3D2F" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="630" fill="#14F195"/>
  
  <!-- Icon: Chain links (simplified) -->
  <g transform="translate(100, 250)">
    <!-- Left chain link -->
    <rect x="0" y="0" width="60" height="80" rx="20" stroke="#14F195" stroke-width="8" fill="none"/>
    <!-- Right chain link -->
    <rect x="50" y="0" width="60" height="80" rx="20" stroke="#14F195" stroke-width="8" fill="none"/>
    <!-- Interlock -->
    <rect x="46" y="-4" width="16" height="88" fill="#0D1F1A"/>
    <rect x="44" y="16" width="20" height="48" rx="6" fill="#14F195"/>
  </g>
  
  <!-- Main title -->
  <text x="280" y="240" font-family="'Space Grotesk', monospace" font-size="72" font-weight="700" fill="#F0F6F6">Okaform</text>
  
  <!-- Subtitle -->
  <text x="280" y="300" font-family="'Inter', sans-serif" font-size="28" fill="#9198A1">Solana-Native Survey Platform</text>
  
  <!-- Green accent line -->
  <rect x="280" y="330" width="120" height="3" fill="#14F195" rx="1.5"/>
  
  <!-- Feature pills -->
  <g transform="translate(280, 370)">
    <rect x="0" y="0" width="140" height="32" rx="4" fill="#151B23" stroke="#3D444D"/>
    <text x="70" y="20" font-family="monospace" font-size="11" fill="#9198A1" text-anchor="middle">ON-CHAIN REWARDS</text>
    
    <rect x="150" y="0" width="110" height="32" rx="4" fill="#151B23" stroke="#3D444D"/>
    <text x="205" y="20" font-family="monospace" font-size="11" fill="#9198A1" text-anchor="middle">BOT-PROOF</text>
    
    <rect x="270" y="0" width="160" height="32" rx="4" fill="#151B23" stroke="#3D444D"/>
    <text x="350" y="20" font-family="monospace" font-size="11" fill="#9198A1" text-anchor="middle">REPUTATION-WEIGHTED</text>
  </g>
  
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="1" fill="#3D444D"/>
  <text x="600" y="610" font-family="monospace" font-size="14" fill="#656C76" text-anchor="middle">okaform.vercel.app</text>
</svg>

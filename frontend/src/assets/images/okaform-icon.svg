<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" role="img" aria-label="Okaform icon">
  <title>Okaform icon</title>

  <!-- Background -->
  <rect width="80" height="80" rx="18" fill="#0D1F1A"/>

  <!-- Left chain link -->
  <rect x="8"  y="20" width="30" height="40" rx="12" stroke="#14F195" stroke-width="7" fill="none"/>
  <!-- Right chain link -->
  <rect x="34" y="20" width="30" height="40" rx="12" stroke="#14F195" stroke-width="7" fill="none"/>
  <!-- Interlock mask + bridge -->
  <rect x="31" y="18" width="8" height="44" fill="#0D1F1A"/>
  <rect x="30" y="28" width="10" height="24" rx="4" fill="#14F195"/>

  <!-- Three survey line indicators at base -->
  <rect x="18" y="66" width="44" height="3" rx="1.5" fill="#1E3D2F"/>
  <rect x="18" y="72" width="32" height="3" rx="1.5" fill="#1E3D2F"/>
</svg>
